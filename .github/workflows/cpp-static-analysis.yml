name: C++ Static Analysis

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_clang_tidy:
        description: Generate compile_commands.json and run opt-in clang-tidy on macOS
        required: false
        default: false
        type: boolean
      ue_root:
        description: Optional Unreal Engine root for opt-in clang-tidy generation
        required: false
        default: ""
        type: string

jobs:
  windows-tools:
    name: Windows lint wrappers
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LLVM and Cppcheck
        shell: pwsh
        run: |
          choco install llvm cppcheck -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\Cppcheck" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify PowerShell wrapper tool discovery
        shell: pwsh
        run: .\tools\lint\cpp_static_analysis.ps1 -CheckTools

      - name: Verify Command Prompt wrapper tool discovery
        shell: cmd
        run: tools\lint\cpp_static_analysis.bat --check-tools

      - name: Verify PowerShell wrapper clang-tidy skip without compile database
        shell: pwsh
        run: .\tools\lint\cpp_static_analysis.ps1 -ClangTidyOnly

      - name: Verify Command Prompt wrapper clang-tidy skip without compile database
        shell: cmd
        run: tools\lint\cpp_static_analysis.bat --clang-tidy-only

      - name: Run PowerShell wrapper cppcheck
        shell: pwsh
        run: .\tools\lint\cpp_static_analysis.ps1 -CppcheckOnly

      - name: Run Command Prompt wrapper cppcheck
        shell: cmd
        run: tools\lint\cpp_static_analysis.bat --cppcheck-only

  macos-tools:
    name: macOS lint wrapper
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LLVM and Cppcheck
        run: brew install llvm cppcheck

      - name: Verify Bash wrapper tool discovery
        run: tools/lint/cpp_static_analysis.sh --check-tools

      - name: Run Bash wrapper
        run: tools/lint/cpp_static_analysis.sh --cppcheck-only

      - name: Generate compile_commands for clang-tidy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_clang_tidy }}
        env:
          UE_ROOT: ${{ inputs.ue_root }}
        run: tools/lint/generate_compile_commands.sh

      - name: Run opt-in clang-tidy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_clang_tidy }}
        env:
          RUN_CLANG_TIDY: "1"
        run: tools/lint/cpp_static_analysis.sh --clang-tidy-only
